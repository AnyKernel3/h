<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>灵心雨下载站 | 自动扫描文件夹1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #02040c);
            min-height: 100vh;
            color: #eef5ff;
            overflow-x: hidden;
            position: relative;
        }

        /* 灵心雨特效：动态雨丝 */
        .rain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .rain-drop {
            position: absolute;
            background: linear-gradient(180deg, rgba(160, 210, 255, 0.7), rgba(70, 140, 250, 0.2));
            width: 2px;
            height: 70px;
            border-radius: 2px;
            filter: blur(1.5px);
            animation: fall linear infinite;
            opacity: 0.6;
        }

        .rain-drop::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -5px;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #c0e4ff, #3e7eff);
            border-radius: 50%;
            opacity: 0.8;
            filter: blur(2px);
        }

        @keyframes fall {
            0% { transform: translateY(-20vh) rotate(0deg); opacity: 0.2; }
            80% { opacity: 0.9; }
            100% { transform: translateY(100vh) rotate(8deg); opacity: 0; }
        }

        /* 浮游光尘 */
        .glow-particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: #8bb9fe;
            border-radius: 50%;
            filter: blur(2px);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: driftGlow 12s infinite alternate ease-in-out;
        }

        @keyframes driftGlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.1; }
            100% { transform: translate(60px, -40px) scale(2.2); opacity: 0.8; }
        }

        /* 主内容区 */
        .wrapper {
            position: relative;
            z-index: 2;
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
            backdrop-filter: blur(12px);
            background: rgba(12, 22, 40, 0.55);
            border-radius: 2.5rem;
            padding: 2rem 1.5rem;
            border: 1px solid rgba(90, 160, 255, 0.35);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.4);
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E5F0FF, #96BCFF, #3f7eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero h1 i {
            background: none;
            color: #88b2ff;
            margin-right: 10px;
        }

        .hero p {
            margin-top: 0.7rem;
            opacity: 0.85;
        }

        .folder-badge {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 50px;
            padding: 6px 18px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            border: 1px solid rgba(90, 160, 255, 0.4);
        }

        /* 搜索栏 */
        .search-area {
            margin: 1.8rem 0 2rem;
            display: flex;
            justify-content: center;
        }

        .search-box {
            background: rgba(25, 35, 60, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 70px;
            padding: 5px 5px 5px 24px;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 580px;
            border: 1px solid rgba(100, 170, 255, 0.6);
            transition: all 0.25s ease;
        }

        .search-box:focus-within {
            border-color: #5d9eff;
            box-shadow: 0 0 20px rgba(75, 140, 255, 0.5);
        }

        .search-box input {
            background: transparent;
            border: none;
            flex: 1;
            padding: 14px 0;
            font-size: 1rem;
            color: #f0f4ff;
            outline: none;
        }

        .search-box input::placeholder {
            color: #a6bfef;
        }

        .search-box button {
            background: linear-gradient(110deg, #3c7eff, #2b5bcb);
            border: none;
            padding: 8px 24px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-box button:hover {
            background: linear-gradient(110deg, #5b8eff, #3f6fdf);
            transform: scale(0.97);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 10px 10px 20px;
        }

        .result-count {
            background: rgba(0, 0, 0, 0.45);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            backdrop-filter: blur(4px);
        }

        .reset-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(90, 150, 255, 0.5);
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: rgba(60, 110, 220, 0.6);
        }

        /* 卡片网格 */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .app-card {
            background: rgba(18, 28, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(80, 140, 230, 0.4);
            padding: 1.5rem;
            transition: all 0.25s ease-in-out;
        }

        .app-card:hover {
            transform: translateY(-6px);
            border-color: rgba(110, 170, 255, 0.7);
            background: rgba(25, 38, 60, 0.75);
        }

        .app-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 16px;
        }

        .app-icon {
            width: 54px;
            height: 54px;
            background: linear-gradient(145deg, #1e2b48, #0f172f);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #b7d0ff;
        }

        .app-name {
            font-size: 1.55rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #c0dcff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .app-info {
            margin: 12px 0 20px 0;
            padding-left: 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-line {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #c6defa;
        }

        .info-line i {
            width: 24px;
            color: #6c9eff;
        }

        /* 底部长条下载栏 */
        .download-bar {
            margin-top: 18px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 4px 4px 20px;
            border: 1px solid rgba(80, 150, 255, 0.5);
        }

        .download-text {
            font-weight: 600;
            font-size: 0.85rem;
            color: #e2efff;
        }

        .download-btn {
            background: linear-gradient(100deg, #2f6ef0, #1a4bcb);
            border: none;
            color: white;
            font-weight: 700;
            padding: 8px 28px;
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .download-btn:hover {
            background: linear-gradient(100deg, #4683ff, #2a5be0);
            transform: scale(0.96);
        }

        .no-result {
            text-align: center;
            font-size: 1.2rem;
            padding: 3rem;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 2rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            font-size: 0.75rem;
            opacity: 0.5;
        }

        @media (max-width: 760px) {
            .wrapper { padding: 1rem; }
            .app-name { font-size: 1.3rem; }
            .apps-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="rain-container" id="rainContainer"></div>

<div class="wrapper">
    <div class="hero">
        <h1><i class="fas fa-cloud-rain"></i> 灵心雨下载站</h1>
        <p>轻灵如雨 · 心之所向 · 极速资源库</p>
        <div class="folder-badge">
            <i class="fas fa-folder-open"></i> 数据源：./文件夹1/ （自动扫描，无内置）
        </div>
    </div>

    <div class="search-area">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索应用名称..." autocomplete="off">
            <button id="searchBtn"><i class="fas fa-arrow-right"></i> 检索</button>
        </div>
    </div>

    <div class="stats">
        <div class="result-count" id="resultCount">✨ 正在扫描文件夹1...</div>
        <div class="reset-btn" id="resetBtn"><i class="fas fa-sync-alt"></i> 显示全部</div>
    </div>

    <div id="appsContainer" class="apps-grid">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> 正在读取 ./文件夹1/ 中的文件...</div>
    </div>

    <footer>
        <i class="fas fa-feather-alt"></i> 灵心雨境 · 自动扫描「文件夹1」目录 | 所有应用均来自该文件夹内的真实文件
    </footer>
</div>

<script>
    // ==============================================
    // 灵心雨下载站 - 完全无内置应用
    // 所有数据通过 scan.php 动态扫描 ./文件夹1/ 获取
    // ==============================================

    let allApps = [];
    let currentApps = [];

    // 从后端获取文件夹1中的文件列表
    async function fetchAppsFromFolder1() {
        try {
            const response = await fetch('./scan.php?_t=' + Date.now());
            if (!response.ok) throw new Error('网络错误');
            const data = await response.json();
            
            // 检查是否有错误
            if (data.error) {
                showError(data.error);
                return;
            }
            
            if (Array.isArray(data) && data.length === 0) {
                showEmpty();
            } else if (Array.isArray(data)) {
                allApps = data;
                currentApps = [...allApps];
                renderApps(currentApps);
            } else {
                showError('数据格式错误');
            }
        } catch (error) {
            console.error('获取失败:', error);
            showError('无法连接后端服务，请确保 scan.php 文件存在且 ./文件夹1/ 目录已创建');
        }
    }

    function showError(msg) {
        document.getElementById('appsContainer').innerHTML = `
            <div class="no-result">
                <i class="fas fa-exclamation-triangle"></i><br>
                ${msg}<br><br>
                <small>请确保：<br>
                1. 在同目录下创建「文件夹1」文件夹<br>
                2. 在「文件夹1」中放入应用文件（.zip/.exe等）<br>
                3. scan.php 文件与当前页面在同一目录</small>
            </div>
        `;
        document.getElementById('resultCount').innerHTML = `⚠️ 扫描失败`;
    }

    function showEmpty() {
        document.getElementById('appsContainer').innerHTML = `
            <div class="no-result">
                <i class="fas fa-folder-open"></i><br>
                「文件夹1」中没有找到任何文件<br><br>
                <small>请在 ./文件夹1/ 目录中放入您的应用文件</small>
            </div>
        `;
        document.getElementById('resultCount').innerHTML = `📁 文件夹1为空 (0个文件)`;
    }

    // 渲染应用卡片
    function renderApps(apps) {
        const container = document.getElementById('appsContainer');
        if (!apps.length) {
            container.innerHTML = `<div class="no-result"><i class="fas fa-cloud-moon"></i> 没有找到匹配的应用，试试其他关键词吧 🌧️</div>`;
            document.getElementById('resultCount').innerHTML = `✨ 共 0 款应用`;
            return;
        }

        let html = '';
        for (let app of apps) {
            // 根据文件名后缀猜测图标
            let iconClass = 'fa-download';
            const ext = (app.filename || '').split('.').pop().toLowerCase();
            const iconMap = {
                'zip': 'fa-file-archive', 'rar': 'fa-file-archive', '7z': 'fa-file-archive',
                'exe': 'fa-windows', 'msi': 'fa-windows',
                'dmg': 'fa-apple', 'pkg': 'fa-apple',
                'apk': 'fa-android',
                'pdf': 'fa-file-pdf', 'mp3': 'fa-music', 'mp4': 'fa-video',
                'jpg': 'fa-image', 'png': 'fa-image', 'gif': 'fa-image'
            };
            iconClass = iconMap[ext] || 'fa-download';
            
            html += `
                <div class="app-card">
                    <div class="app-header">
                        <div class="app-icon"><i class="fas ${iconClass}"></i></div>
                        <div class="app-name">${escapeHtml(app.name)}</div>
                    </div>
                    <div class="app-info">
                        <div class="info-line"><i class="fas fa-tag"></i> <span>版本: ${escapeHtml(app.version)}</span></div>
                        <div class="info-line"><i class="fas fa-hdd"></i> <span>大小: ${escapeHtml(app.size)}</span></div>
                        <div class="info-line"><i class="fas fa-folder-open"></i> <span>来源: 文件夹1</span></div>
                        <div class="info-line"><i class="fas fa-file"></i> <span>文件: ${escapeHtml(app.filename)}</span></div>
                        <div class="info-line"><i class="fas fa-info-circle"></i> <span>${escapeHtml(app.description)}</span></div>
                    </div>
                    <div class="download-bar">
                        <span class="download-text"><i class="fas fa-arrow-down"></i> 从文件夹1下载</span>
                        <button class="download-btn" data-url="${escapeHtml(app.downloadUrl)}" data-name="${escapeHtml(app.name)}">下 载</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        document.getElementById('resultCount').innerHTML = `✨ 共 ${apps.length} 款应用 | 来自「文件夹1」`;

        // 绑定下载事件
        document.querySelectorAll('.download-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const url = btn.getAttribute('data-url');
                const name = btn.getAttribute('data-name');
                if (url) {
                    triggerDownload(url, name);
                } else {
                    showToast('❌ 下载链接无效');
                }
            });
        });
    }

    // 触发下载
    function triggerDownload(url, fileNameHint) {
        const link = document.createElement('a');
        link.href = url;
        link.download = '';
        link.target = '_blank';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast(`🌧️ 开始下载：${fileNameHint}`);
    }

    // 搜索功能
    function performSearch() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        if (keyword === '') {
            currentApps = [...allApps];
        } else {
            currentApps = allApps.filter(app => {
                return app.name.toLowerCase().includes(keyword) ||
                       app.description.toLowerCase().includes(keyword) ||
                       (app.filename && app.filename.toLowerCase().includes(keyword));
            });
        }
        renderApps(currentApps);
    }

    function resetSearch() {
        document.getElementById('searchInput').value = '';
        currentApps = [...allApps];
        renderApps(currentApps);
        showToast('✨ 已显示全部应用');
    }

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.cssText = `
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 35, 65, 0.95);
            backdrop-filter: blur(12px);
            color: #d9efff;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            border: 1px solid #5d9eff;
            z-index: 9999;
            pointer-events: none;
            white-space: nowrap;
        `;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 2000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 雨滴特效
    function initRainEffect() {
        const rainContainer = document.getElementById('rainContainer');
        for (let i = 0; i < 100; i++) {
            const drop = document.createElement('div');
            drop.classList.add('rain-drop');
            drop.style.left = Math.random() * 100 + '%';
            drop.style.animationDuration = 1.2 + Math.random() * 2.5 + 's';
            drop.style.animationDelay = Math.random() * 8 + 's';
            drop.style.height = 40 + Math.random() * 60 + 'px';
            rainContainer.appendChild(drop);
        }
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.classList.add('glow-particle');
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDuration = 7 + Math.random() * 12 + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(particle);
        }
    }

    function bindEvents() {
        document.getElementById('searchBtn').addEventListener('click', performSearch);
        document.getElementById('resetBtn').addEventListener('click', resetSearch);
        document.getElementById('searchInput').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    }

    initRainEffect();
    bindEvents();
    fetchAppsFromFolder1();
</script>
</body>
</html>
